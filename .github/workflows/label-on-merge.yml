name: Label cleanup on merge

on:
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  issues: write
  pull-requests: write

jobs:
  cleanup-labels:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Remove WIP labels from PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          WIP_LABELS=("claude:ready" "claude:in-progress" "claude:review" "claude:revise" "claude:blocked")
          for label in "${WIP_LABELS[@]}"; do
            gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "$label" 2>/dev/null || true
          done
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "claude:completed" 2>/dev/null || true

      - name: Find and update linked issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY: ${{ github.event.pull_request.body }}
          REPO: ${{ github.repository }}
        run: |
          WIP_LABELS=("claude:ready" "claude:in-progress" "claude:review" "claude:revise" "claude:blocked")

          # Extract issue numbers from closing keywords in PR body
          ISSUE_NUMBERS=$(echo "$PR_BODY" | grep -oiE '(closes|fixes|resolves)[[:space:]]+#[0-9]+' | grep -oE '[0-9]+' || true)

          for issue in $ISSUE_NUMBERS; do
            for label in "${WIP_LABELS[@]}"; do
              gh issue edit "$issue" --repo "$REPO" --remove-label "$label" 2>/dev/null || true
            done
            gh issue edit "$issue" --repo "$REPO" --add-label "claude:completed" 2>/dev/null || true
          done
